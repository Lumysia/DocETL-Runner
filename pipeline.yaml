# Example DocETL pipeline template
#
# This template uses placeholders that are automatically replaced at runtime:
#   {{INPUT_JSON}}       - Path to the generated input JSON file
#   {{OUTPUT_FILE}}      - Path to the output JSON file
#   {{INTERMEDIATE_DIR}} - Directory for intermediate processing files
#
# Usage:
#   python main.py <input_folder> -p pipeline_template.yaml -o output.json
#
# Optional environment variables:
#   DOCETL_DEFAULT_MODEL - override the pipeline model name
#   DOCETL_REWRITE_MODEL - override the optimizer rewrite model
#   DOCETL_VALIDATE_RETRIES - override validation retry count

from_docwrangler: true
parsing_tools:
  - name: docling_pdf_to_markdown
    function_code: |
      def docling_pdf_to_markdown(document, input_key="pdf_path", output_key="docling_markdown", strict_text=False):
          from docetl_runner.docling import docling_pdf_to_markdown as _shared_docling_pdf_to_markdown

          return _shared_docling_pdf_to_markdown(
              document,
              input_key=input_key,
              output_key=output_key,
              strict_text=strict_text,
          )

datasets:
  input:
    type: file
    path: {{INPUT_JSON}}
    source: local
    parsing:
      - function: docling_pdf_to_markdown
        input_key: pdf_path
        output_key: docling_markdown

default_model: ${DOCETL_DEFAULT_MODEL:-openrouter/google/gemini-3-flash-preview}
optimizer_config:
  rewrite_agent_model: ${DOCETL_REWRITE_MODEL:-gpt-5-nano}

operations:
  - type: map
    name: extract_structured_document_data
    skip_on_error: true
    prompt: |
      You are extracting structured information from a document.

      Source file: {{ input.filename }}

      Document markdown:

      {{ input.docling_markdown }}

      Task:

      Extract the following fields:

      1) title
      2) document_id
      3) document_type
      4) summary
      5) key_points
      6) entities

      Extraction rules:

      - Only use information explicitly present in the document.
      - Do not guess missing values.
      - For unknown scalar values, return null.
      - For unknown list fields, return an empty list.
      - Preserve wording as closely as possible when capturing key points or entities.

      Field requirements:

      - title: best available document title
      - document_id: DOI, report number, accession number, or another explicit identifier if present
      - document_type: paper, report, manual, policy, slide deck, or another explicit type when stated or strongly evident from the document
      - summary: concise 2-4 sentence summary grounded in the source text
      - key_points: a list of the most important explicit findings, claims, sections, or takeaways from the document
      - entities: a list of objects with name, type, and provenance

      Output rules:

      - Provide the output strictly as structured data according to the schema.

      - Include provenance in each entity so a reviewer can verify the extracted value.
    output:
      schema:
        title: string
        document_id: string
        document_type: string
        summary: string
        key_points: 'list[string]'
        entities: 'list[{name: string, type: string, provenance: string}]'
    optimize: 'true'
    num_retries_on_validate_failure: ${DOCETL_VALIDATE_RETRIES:-2}
    model: ${DOCETL_DEFAULT_MODEL:-openrouter/google/gemini-3-flash-preview}
  - type: map
    name: normalize_structured_document_data
    prompt: |
      You are a data normalization assistant.

      Input Data:

      Title: {{ input.title }}

      Document ID: {{ input.document_id }}

      Document Type: {{ input.document_type }}

      Summary: {{ input.summary }}

      Key Points: {{ input.key_points }}

      Entities: {{ input.entities }}

      Task:

      - Clean whitespace in string fields.
      - Remove duplicate key points while preserving order.
      - Remove duplicate entities when both name and type are identical.
      - Keep provenance text unchanged.
    output:
      schema:
        title: string
        document_id: string
        document_type: string
        summary: string
        key_points: 'list[string]'
        entities: 'list[{name: string, type: string, provenance: string}]'
    input: extract_structured_document_data
    model: ${DOCETL_DEFAULT_MODEL:-openrouter/google/gemini-3-flash-preview}

pipeline:
  steps:
    - name: data_processing
      input: input
      operations:
        - extract_structured_document_data
        - normalize_structured_document_data

  output:
    type: file
    path: {{OUTPUT_FILE}}
    intermediate_dir: {{INTERMEDIATE_DIR}}

system_prompt:
  dataset_description: |
    A set of PDF documents. Each item has a filename, a local PDF path, and Docling-generated markdown text.
  persona: |
    A meticulous document analyst who extracts structured information carefully, avoids unsupported assumptions, and preserves clear provenance.
